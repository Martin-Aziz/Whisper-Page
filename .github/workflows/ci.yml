name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  # ─── Frontend Checks ──────────────────────────────────────────────────────────
  frontend:
    name: Frontend (TypeScript + Tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check (fail fast)
        run: npm run typecheck

      - name: Lint (zero warnings)
        run: npm run lint

      - name: Format check
        run: npx prettier --check "src/**/*.{ts,tsx}"

      - name: Unit + Integration tests with coverage
        run: npm run test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ─── Rust Backend Checks ──────────────────────────────────────────────────────
  rust:
    name: Rust Backend (Clippy + Tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Rust format check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Clippy (zero warnings)
        working-directory: src-tauri
        run: cargo clippy --all-features -- -D warnings

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test --all-features

  # ─── Security Audit ───────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: npm audit
        run: npm audit --audit-level=moderate

      - name: Install Cargo audit
        run: cargo install cargo-audit --locked

      - name: Cargo audit
        working-directory: src-tauri
        run: cargo audit

  # ─── Build Verification ───────────────────────────────────────────────────────
  build:
    name: Build Verification
    needs: [frontend, rust]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Frontend build
        run: npm run build

      - name: Assert bundle size
        run: |
          SIZE=$(du -sk dist | cut -f1)
          echo "Bundle size: ${SIZE}KB"
          # Fail if frontend bundle exceeds 5MB (excluding assets)
          if [ "$SIZE" -gt 5120 ]; then
            echo "ERROR: Bundle too large: ${SIZE}KB > 5120KB"
            exit 1
          fi
